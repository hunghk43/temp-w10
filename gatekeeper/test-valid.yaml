# PASS: Pod hợp lệ — vượt qua tất cả luật kể cả Lab 1.3 (registry whitelist)
apiVersion: v1
kind: Pod
metadata:
  name: test-pass-valid
  namespace: demo
spec:
  securityContext:
    runAsUser: 1000
    runAsNonRoot: true
  containers:
  - name: app
    image: ghcr.io/hunghk43/w10-api:0.0.3
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

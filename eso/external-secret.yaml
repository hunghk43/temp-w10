apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-db-secret
  namespace: demo
spec:
  # Poll AWS mỗi 30s → secret cập nhật < 60s sau khi rotate trên AWS
  refreshInterval: 30s

  secretStoreRef:
    name: aws-store
    kind: SecretStore

  target:
    name: api-db-secret      # tên K8s Secret được tạo ra
    creationPolicy: Owner    # ESO sở hữu Secret — xóa ExternalSecret = xóa Secret

  data:
    - secretKey: db-password           # key trong K8s Secret
      remoteRef:
        key: prod/api/db               # secret path trong AWS Secrets Manager
        # property: password           # bỏ comment nếu secret lưu dạng JSON {"password": "..."}
        # không set property → lấy toàn bộ string value

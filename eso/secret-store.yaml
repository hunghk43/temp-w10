apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-store
  namespace: demo
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        # Lab (minikube): auth qua access key lưu trong K8s Secret aws-creds
        # Tạo tay bằng: kubectl create secret generic aws-creds \
        #   --from-literal=access-key=AKIAXXXXXXXX \
        #   --from-literal=secret-key=xxxxxxxxxxxxxxxx \
        #   -n demo
        # KHÔNG commit aws-creds vào git
        secretRef:
          accessKeyIDSecretRef:
            name: aws-creds
            key: access-key
          secretAccessKeySecretRef:
            name: aws-creds
            key: secret-key

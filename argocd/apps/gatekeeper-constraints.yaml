apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-constraints
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # sau templates — CRD phải tồn tại trước
spec:
  project: default
  source:
    repoURL: https://github.com/hunghk43/temp-w10.git
    targetRevision: main
    path: gatekeeper/constraints
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

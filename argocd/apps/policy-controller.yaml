apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policy-controller
  namespace: argocd
  annotations:
    # wave 1: cài sau ESO operator, trước policies
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://sigstore.github.io/helm-charts
    chart: policy-controller
    targetRevision: "0.10.1"
    helm:
      values: |
        # Không enforce toàn cluster — chỉ ns có label policy.sigstore.dev/include=true
        config:
          enforcementAction: "enforce"
  destination:
    server: https://kubernetes.default.svc
    namespace: cosign-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
